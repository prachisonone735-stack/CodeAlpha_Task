<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; font-family: Arial, sans-serif; margin: 0; }
        .calculator { background-color: #333; padding: 20px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.3); }
        #display { width: 100%; height: 50px; background-color: #fff; border: none; margin-bottom: 20px; font-size: 24px; text-align: right; padding-right: 10px; box-sizing: border-box; border-radius: 5px; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 20px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; background-color: #e0e0e0; transition: 0.2s; }
        button:active { background-color: #bbb; }
        .operator { background-color: #ff9500; color: white; }
        .clear { background-color: #ff3b30; color: white; }
    </style>
</head>
<body>
<div class="calculator">
    <input type="text" id="display" readonly>
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="appendValue('/')" class="operator">/</button>
        <button onclick="appendValue('*')" class="operator">*</button>
        <button onclick="appendValue('-')" class="operator">-</button>
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('+')" class="operator">+</button>
        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="calculate()" style="grid-row: span 2; background-color: #34c759; color: white;">=</button>
        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('0')" style="grid-column: span 2;">0</button>
        <button onclick="appendValue('.')">.</button>
    </div>
</div>
<script>
    let display = document.getElementById('display');
    function appendValue(val) { display.value += val; }
    function clearDisplay() { display.value = ''; }
    function calculate() {
        try { display.value = eval(display.value); }
        catch(err) { display.value = 'Error'; }
    }
</script>
</body>
</html>
